<!-- Recuadro de confirmación de eliminación (reutilizable) -->
<div class="modal fade" id="modalEliminar" tabindex="-1" aria-hidden="true">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Confirmar eliminación</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Cerrar"></button>
      </div>
      <div class="modal-body">
        ¿Seguro que deseas eliminar <strong id="modal-eliminar-nombre"></strong>?
        <div class="text-danger small mt-1">Esta acción no se puede deshacer.</div>
      </div>
      <div class="modal-footer">
        <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Cancelar</button>
        <form method="POST" id="modal-eliminar-form" class="d-inline">
          <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
          <button type="submit" class="btn btn-danger"><i class="bi bi-trash"></i> Eliminar</button>
        </form>
      </div>
    </div>
  </div>
</div>

<script>
  (function () {
    const modal = document.getElementById('modalEliminar');
    if (!modal) return;
    modal.addEventListener('show.bs.modal', function (event) {
      const boton = event.relatedTarget;
      document.getElementById('modal-eliminar-nombre').textContent = boton.dataset.nombre;
      document.getElementById('modal-eliminar-form').action = boton.dataset.url;
    });
  })();
</script>
