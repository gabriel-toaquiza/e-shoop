{% extends 'base.html' %}
{% block title %}Error {{ codigo }} – Verova{% endblock %}

{% block content %}
<div class="text-center py-5 my-5">
  <div class="display-1 fw-bold text-primary">{{ codigo }}</div>
  <h2 class="fw-bold mt-2">{{ titulo }}</h2>
  <p class="text-muted mb-4">{{ mensaje }}</p>
  <a href="{{ url_for('public.home') }}" class="btn btn-primary">
    <i class="bi bi-house"></i> Volver al inicio
  </a>
  <a href="{{ url_for('public.tienda') }}" class="btn btn-outline-primary">Ir a la tienda</a>
</div>
{% endblock %}
